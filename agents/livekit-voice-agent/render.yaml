services:
  - type: web
    name: magpipe-livekit-agent
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt && HF_HOME=/opt/render/project/src/hf_cache python -c "from huggingface_hub import snapshot_download; snapshot_download('livekit/turn-detector', revision='v0.4.1-intl'); print('Turn detector snapshot downloaded')" && python agent.py download-files
    startCommand: python agent.py start
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SIGNALWIRE_SPACE
        sync: false
      - key: SIGNALWIRE_PROJECT_ID
        sync: false
      - key: SIGNALWIRE_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
